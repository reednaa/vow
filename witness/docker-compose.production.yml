services:
  migrate:
    build:
      context: .
      dockerfile: witness/Dockerfile
    command: bun run start:migrate
    environment:
      DATABASE_URL: ${DATABASE_URL:?}
    restart: "no"

  api:
    build:
      context: .
      dockerfile: witness/Dockerfile
    command: bun src/entrypoints/api.ts
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: ${DATABASE_URL:?}
      WITNESS_SIGNER_ADDRESS: ${WITNESS_SIGNER_ADDRESS:?}
      API_PORT: ${API_PORT:-3000}
      HEALTH_PORT: ${HEALTH_PORT:-3001}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH:-}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET:-}
    expose:
      - "${API_PORT:-3000}"
      - "${HEALTH_PORT:-3001}"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:${HEALTH_PORT:-3001}/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: witness/Dockerfile
    command: bun src/entrypoints/worker.ts
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: ${DATABASE_URL:?}
      WITNESS_PRIVATE_KEY: ${WITNESS_PRIVATE_KEY:?}
      WORKER_HEALTH_PORT: ${WORKER_HEALTH_PORT:-3002}
    expose:
      - "${WORKER_HEALTH_PORT:-3002}"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:${WORKER_HEALTH_PORT:-3002}/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
